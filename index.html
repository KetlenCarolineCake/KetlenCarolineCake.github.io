<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Encomenda de Bolos Artesanais | Ketlen Caroline</title>

  <link rel="stylesheet" href="style.css">
  <title>Confeitaria artesanal por Ketlen Caroline</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <h1>Bolos artesanais  <br>
      <em>Ketlen Caroline</em></h1>
    <div class="divider"></div>
    <p class="lead">✨  formulário de pedido  ✨</p>

  </div>

  <div class="container" style="max-width: 680px; padding: 2rem 1rem 3rem;">
    <div class="form-card">

      <!-- DADOS DO CLIENTE -->
      <div class="section-title">
        <div class="section-icon">👤</div>
        Os seus dados
      </div>
      <div class="row g-3 mb-4">
        <div class="col-12">
          <label class="form-label" for="nome">Nome completo</label>
          <input type="text" class="form-control" id="nome" placeholder="Como devo tratar-te?" />
        </div>
        <div class="col-12">
          <label class="form-label" for="contato">Contacto (telefone ou email)</label>
          <input type="text" class="form-control" id="contato" placeholder="+351 9XX XXX XXX" />
        </div>
      </div>

      <!-- CONFIGURAÇÃO DO BOLO -->
      <div class="section-title">
        <div class="section-icon">🎂</div>
        O seu bolo
      </div>
      <div class="row g-3 mb-3">

        <!-- MASSA -->
        <div class="col-12 col-sm-6">
          <label class="form-label" for="massa">Massa</label>
          <select class="form-select" id="massa" onchange="atualizarResumo()">
            <option value="">Escolhe a massa...</option>
            <option>Baunilha</option>
            <option>Chocolate</option>
            <option>Red Velvet</option>
          </select>
        </div>

        <!-- RECHEIO -->
        <div class="col-12 col-sm-6">
          <label class="form-label" for="recheio">Recheio</label>
          <select class="form-select" id="recheio" onchange="atualizarSubRecheio(); atualizarResumo()">
            <option value="">Escolhe o recheio...</option>
            <option value="brigadeiro">Brigadeiro</option>
            <option value="ganache">Ganache</option>
            <option value="geleia">Geléia de fruta</option>
          </select>
        </div>

        <!-- SUB-RECHEIO -->
        <div class="col-12 col-sm-6" id="wrap-subrecheio" style="display:none">
          <label class="form-label" for="subrecheio">Sabor do recheio</label>
          <select class="form-select" id="subrecheio" onchange="atualizarResumo()">
          </select>
        </div>

        <!-- COBERTURA -->
        <div class="col-12 col-sm-6">
          <label class="form-label" for="cobertura">Cobertura</label>
          <select class="form-select" id="cobertura" onchange="atualizarResumo()">
            <option value="">Escolhe a cobertura...</option>
            <option>Chantilly</option>
            <option>Ganache</option>
            <option>Brigadeiro</option>
            <option>Naked</option>
            <option>Semi-naked</option>
          </select>
        </div>

        <!-- TOPO -->
        <div class="col-12 col-sm-6">
          <label class="form-label" for="topo">Decoração do topo</label>
          <select class="form-select" id="topo" onchange="atualizarResumo()">
            <option value="">Escolhe a decoração...</option>
            <option>Flores</option>
            <option>Raspas de chocolate</option>
            <option>Brigadeiros</option>
            <option>Trabalho de bico</option>
            <option>Topos de papel</option>
            <option>Amêndoas</option>
            <option>Coco</option>
          </select>
        </div>

        <!-- TAMANHO -->
        <div class="col-12 col-sm-6">
          <label class="form-label" for="tamanho">Tamanho do bolo</label>
          <select class="form-select" id="tamanho" onchange="atualizarResumo()">
            <option value="">Escolhe o tamanho...</option>
            <option value="15cm">15 cm</option>
            <option value="20cm">20 cm</option>
            <option value="25cm">25 cm</option>
            <option value="30cm">30 cm</option>
          </select>
        </div>

        <!-- OCASIÃO / OBS -->
        <div class="col-12">
          <label class="form-label" for="obs">Ocasião ou observações (opcional)</label>
          <textarea class="form-control" id="obs" rows="2" placeholder="Ex: aniversário, mensagem no bolo, alergias..."></textarea>
        </div>

        <!-- IMAGENS DE REFERÊNCIA -->
        <div class="col-12">
          <label class="form-label">Imagens de referência (máx. 2)</label>
          <div class="upload-area" id="upload-area" onclick="document.getElementById('imagens').click()">
            <div id="upload-placeholder">
              <div style="font-size:2rem; margin-bottom:0.4rem;">📎</div>
              <div style="font-weight:500; color:#c49268; font-size:0.95rem;">Clica para escolher imagens</div>
              <div style="font-size:0.8rem; color:#b8a390; margin-top:0.2rem;">JPG, PNG ou WEBP · máx. 2 imagens · compressão automática</div>
            </div>
            <div id="preview-container" style="display:none; gap:12px; justify-content:center; flex-wrap:wrap;"></div>
          </div>
          <input type="file" id="imagens" accept="image/jpeg,image/png,image/webp" multiple style="display:none" onchange="handleImagens(event)" />
          <div id="img-erro" style="display:none; color:#993c11; font-size:0.82rem; margin-top:0.4rem;"></div>
        </div>
      </div>

      <!-- RESUMO DO BOLO -->
      <div class="mb-4">
        <label class="form-label">Resumo da encomenda</label>
        <div id="resumo-bolo">Ainda sem escolhas feitas...</div>
      </div>

      <!-- BOTÕES ENVIAR -->
      <button class="btn-encomendar" onclick="enviarAmbos()" id="btn-enviar">
        
        Efetuar pedido 
      </button>
      <div id="msg-feedback" style="display:none; text-align:center; font-size:0.9rem; padding:0.6rem; border-radius:10px; margin-top:0.5rem;"></div>

    </div><!-- /form-card -->
  </div><!-- /container -->

  <footer>
    Feito com amor 🎂 · Encomendas por Email
  </footer>

<script src="script.js"></script>
</body>
</html>
